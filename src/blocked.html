<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Back to focus</title>
  <link rel="stylesheet" href="src/blocked.css">
</head>
<body>
  <div class="center">
    <h1>Back to focus</h1>
    <p>This site is blocked to help you stay focused.</p>
    <p id="orig"></p>
    <a id="home" href="#">Go back</a>
  </div>
  <script>
    function getQueryParam(name) {
      const params = new URLSearchParams(location.search);
      return params.get(name);
    }
    const orig = getQueryParam('url');
    if (orig) {
      document.getElementById('orig').textContent = 'Attempted: ' + orig;
    }
    document.getElementById('home').addEventListener('click', (e) => {
      e.preventDefault();
      window.location.href = 'about:blank';
    });
  </script>
</body>
</html>
